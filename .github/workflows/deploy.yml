name: Build and Deploy to Render

on:
  push:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # Required to push to GHCR

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # This step converts your GitHub username/repo to lowercase
      - name: Sanitize image name
        id: slug
        run: |
          echo "IMAGE_ID=$(echo ghcr.io/${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Uses the lowercase name from the 'slug' step above
          tags: ${{ steps.slug.outputs.IMAGE_ID }}:latest

      - name: Deploy to Render
        # Only triggers if the Build/Push step succeeds
        run: |
          curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK }}